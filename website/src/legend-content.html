<div class="legend-header">
  <h4>Legend</h4>
  <button class="legend-toggle" title="Close legend">−</button>
</div>
<div class="legend-content">
  <div class="legend-section">
    <div class="legend-item">
      <svg class="legend-deal legend-orange"><use href="../images/deals.svg#my-deal-icon"></use></svg>
      <span class="legend-label">High accuracy point represented deals</span>
    </div>

    <div class="legend-item">
      <svg class="legend-deal legend-blue"><use href="../images/deals.svg#my-deal-icon"></use></svg>
      <span class="legend-label">Low accuracy point represented deals</span>
    </div>

    <div class="legend-item">
      <img src="../images/areas.svg" class="legend-area" alt="Area shape">
      <span class="legend-label">Deals with a shape provided by partners</span>
    </div>

    <div class="legend-item">
      <img src="../images/administrative_region.svg" class="legend-region" alt="Administrative region shape">
      <span class="legend-label">Administrative regions crossing polygon(s)</span>
    </div>
  </div>
</div>
